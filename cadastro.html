<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - TechZone</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo">
                    <div class="logo-icon"><img src="img/LogoTZZ.png" alt="TechZone Logo"></div>
                    <span class="logo-text">TechZone</span>
                </div>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="cadastro.html" class="active">Cadastro</a></li>
                    <li><a href="forum.html">Forum</a></li>
                    <li><a href="galeria.html">Galeria</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>


    <section class="page-header">
        <h1>Cadastre-se</h1>
        <p>Faca parte da maior comunidade tech do Brasil</p>
    </section>

    <section class="section">
        <div class="form-container">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha segura" required>
                </div>

                <div class="form-group">
                    <label for="confirmar-senha">Confirmar Senha</label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Confirme sua senha"
                        required>
                </div>

                <div class="form-group">
                    <label>Selecione suas areas de interesse:</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesses" value="frontend">
                            Front-end
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesses" value="backend">
                            Back-end
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesses" value="ia">
                            Inteligencia Artificial
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesses" value="mobile">
                            Mobile
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesses" value="devops">
                            DevOps
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesses" value="dados">
                            Ciencia de Dados
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesses" value="seguranca">
                            Ciberseguranca
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesses" value="games">
                            Desenvolvimento de Games
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nivel">Nivel de Experiencia</label>
                    <select id="nivel" name="nivel" required>
                        <option value="">Selecione seu nivel</option>
                        <option value="iniciante">Iniciante</option>
                        <option value="intermediario">Intermediario</option>
                        <option value="avancado">Avancado</option>
                        <option value="profissional">Profissional</option>
                    </select>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                    <button type="reset" class="btn btn-reset">Limpar</button>
                </div>
            </form>
        </div>
    </section>


    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="index.html">Inicio</a>
                <a href="cadastro.html">Cadastro</a>
                <a href="forum.html">Forum</a>
                <a href="galeria.html">Galeria</a>
                <a href="contato.html">Contato</a>
            </div>
            <p class="footer-copyright">
                &copy; 2026 Kauan Zembruski - Comunidade de Tecnologia. Todos os direitos reservados.
            </p>
        </div>
    </footer>
</body>

</html>
